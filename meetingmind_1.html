<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetingMind — AI 会议总结</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #070d1a;
  --navy2: #0d1628;
  --navy3: #111e35;
  --teal: #00e5cc;
  --teal-dim: rgba(0,229,204,0.10);
  --teal-glow: rgba(0,229,204,0.30);
  --amber: #ffb547;
  --red: #ff5c5c;
  --white: #e8f0fe;
  --muted: #4a6080;
  --border: rgba(0,229,204,0.14);
  --font-head: 'Syne', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-body: 'Noto Sans SC', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,204,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,204,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-20%;right:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(0,229,204,0.055) 0%,transparent 70%);pointer-events:none;z-index:0;}

#app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 24px 100px;}

header{text-align:center;margin-bottom:52px;animation:fadeUp .7s ease both;}
.logo-wrap{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;}
.logo-box{width:38px;height:38px;border:1.5px solid var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--teal-glow);}
.logo-box svg{width:20px;height:20px;}
.logo-name{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-.5px;}
.logo-name em{color:var(--teal);font-style:normal;}
h1{font-family:var(--font-head);font-size:clamp(30px,5vw,50px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px;}
h1 em{color:var(--teal);font-style:normal;}
.sub{font-size:14px;color:var(--muted);font-weight:300;}

.card{background:var(--navy2);border:1px solid var(--border);border-radius:18px;padding:32px;margin-bottom:20px;animation:fadeUp .6s ease both;}

.drop{border:1.5px dashed var(--border);border-radius:12px;padding:44px 24px;cursor:pointer;transition:all .22s;text-align:center;margin-bottom:20px;}
.drop:hover,.drop.over{border-color:var(--teal);background:var(--teal-dim);}
.drop-icon{font-size:36px;margin-bottom:12px;opacity:.6;}
.drop-title{font-family:var(--font-head);font-size:16px;font-weight:700;margin-bottom:5px;}
.drop-sub{font-size:13px;color:var(--muted);}
.drop-fmt{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.4px;}
#fileInput{display:none;}

.file-info{display:none;align-items:center;gap:14px;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;}
.file-info.show{display:flex;}
.fi-icon{font-size:22px;}
.fi-name{font-family:var(--font-mono);font-size:13px;font-weight:500;word-break:break-all;}
.fi-size{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}
.fi-clear{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color .2s;flex-shrink:0;}
.fi-clear:hover{color:var(--red);}

.div{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:12px;font-family:var(--font-mono);margin-bottom:20px;}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--border);}

.rec-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.btn-rec{display:flex;align-items:center;gap:12px;background:transparent;border:1.5px solid var(--border);border-radius:50px;padding:13px 30px;color:var(--white);font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all .22s;}
.btn-rec:hover{border-color:var(--red);color:var(--red);}
.btn-rec.on{border-color:var(--red);color:var(--red);background:rgba(255,92,92,.07);}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--red);}
.btn-rec.on .rec-dot{animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
canvas#wv{width:100%;height:44px;display:none;}
canvas#wv.on{display:block;}
.timer{font-family:var(--font-mono);font-size:20px;font-weight:500;color:var(--teal);letter-spacing:2px;display:none;}
.timer.on{display:block;}

.btn-go{width:100%;background:var(--teal);border:none;border-radius:10px;color:var(--navy);font-family:var(--font-head);font-size:16px;font-weight:800;padding:16px;cursor:pointer;transition:all .22s;display:none;margin-top:4px;}
.btn-go:hover{background:#00f5da;transform:translateY(-1px);box-shadow:0 8px 28px var(--teal-glow);}
.btn-go.show{display:block;}
.btn-go:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

.err{background:rgba(255,92,92,.07);border:1px solid rgba(255,92,92,.25);border-radius:10px;padding:13px 16px;font-size:13px;color:var(--red);font-family:var(--font-mono);display:none;margin-top:12px;}
.err.show{display:block;}

#pipe{display:none;animation:fadeUp .4s ease both;}
#pipe.show{display:block;}
.pipe-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:24px;}
.nodes{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;padding-bottom:4px;}
.nd{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;min-width:70px;position:relative;}
.nd::after{content:'';position:absolute;top:19px;left:calc(50% + 18px);right:calc(-50% + 18px);height:1px;background:var(--border);transition:background .4s;}
.nd:last-child::after{display:none;}
.nd.done::after{background:var(--teal);}
.nd-circle{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--navy);position:relative;z-index:1;transition:all .4s;}
.nd.active .nd-circle{border-color:var(--teal);box-shadow:0 0 18px var(--teal-glow);animation:glow 1.5s ease infinite;}
.nd.done .nd-circle{border-color:var(--teal);background:var(--teal-dim);}
@keyframes glow{0%,100%{box-shadow:0 0 12px var(--teal-glow)}50%{box-shadow:0 0 26px var(--teal-glow)}}
.nd-lbl{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;line-height:1.4;transition:color .3s;}
.nd.active .nd-lbl,.nd.done .nd-lbl{color:var(--teal);}

.prog-row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12px;color:var(--white);margin-bottom:9px;}
.prog-row span{color:var(--teal);}
.track{width:100%;height:4px;background:var(--navy);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease;box-shadow:0 0 8px var(--teal-glow);}
.log{max-height:110px;overflow-y:auto;font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.9;}
.ll{display:flex;gap:10px;}
.ll.ok{color:var(--teal);}
.ll.er{color:var(--red);}
.lt{opacity:.45;flex-shrink:0;}

#res{display:none;animation:fadeUp .5s ease both;}
#res.show{display:block;}
.res-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.res-title{font-family:var(--font-head);font-size:24px;font-weight:800;letter-spacing:-.5px;}
.res-acts{display:flex;gap:8px;flex-wrap:wrap;}
.btn-act{background:var(--navy2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:var(--font-mono);font-size:11px;padding:8px 14px;cursor:pointer;transition:all .2s;}
.btn-act:hover{border-color:var(--teal);color:var(--teal);}
.btn-new{background:var(--teal-dim);color:var(--teal);}
.btn-new:hover{background:rgba(0,229,204,.18);}

.sgrid{display:grid;gap:14px;}
.sc{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:22px;transition:border-color .2s;animation:fadeUp .5s ease both;}
.sc:hover{border-color:rgba(0,229,204,.28);}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sc-title{font-family:var(--font-head);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal);}
.sc-copy{background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font-mono);font-size:11px;padding:4px 8px;border-radius:6px;transition:all .2s;}
.sc-copy:hover{background:var(--teal-dim);color:var(--teal);}
.sc-body{font-size:14px;line-height:1.75;color:var(--white);}
.sc-body ul{list-style:none;}
.sc-body li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:10px;align-items:flex-start;}
.sc-body li:last-child{border-bottom:none;}
.sc-body li::before{content:'▸';color:var(--teal);flex-shrink:0;margin-top:2px;font-size:11px;}
.ai-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:3px;}
.ai-meta span{color:var(--amber);}

.coll{background:var(--navy2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:14px;}
.coll-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 22px;cursor:pointer;user-select:none;transition:background .2s;}
.coll-hd:hover{background:rgba(255,255,255,.02);}
.coll-ttl{font-family:var(--font-head);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.coll-arr{color:var(--muted);transition:transform .3s;font-size:11px;}
.coll.open .coll-arr{transform:rotate(180deg);}
.coll-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.coll.open .coll-body{max-height:380px;}
.coll-txt{font-family:var(--font-mono);font-size:11px;line-height:1.85;color:var(--muted);padding:0 22px 18px;overflow-y:auto;max-height:360px;white-space:pre-wrap;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:11px 22px;font-family:var(--font-mono);font-size:13px;color:var(--teal);transition:transform .3s ease;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.5);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:580px){.card{padding:20px 14px;}#pipe{padding:20px 14px;}.nd-lbl{font-size:9px;}}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo-wrap">
    <div class="logo-box">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="5" width="2.5" height="10" rx="1.25" fill="#00e5cc"/>
        <rect x="6.5" y="2" width="2.5" height="16" rx="1.25" fill="#00e5cc" opacity=".7"/>
        <rect x="11" y="4" width="2.5" height="12" rx="1.25" fill="#00e5cc" opacity=".45"/>
        <rect x="15.5" y="7" width="2.5" height="6" rx="1.25" fill="#00e5cc" opacity=".25"/>
      </svg>
    </div>
    <span class="logo-name">Meeting<em>Mind</em></span>
  </div>
  <h1>会议录音<br><em>智能总结</em></h1>
  <p class="sub">上传或录制任意时长 · 分块处理不崩溃 · AI 提炼会议重点</p>
</header>

<div class="card" id="inputCard">
  <div class="drop" id="dz" onclick="document.getElementById('fileInput').click()">
    <div class="drop-icon">🎙️</div>
    <div class="drop-title">拖拽音频文件到这里</div>
    <div class="drop-sub">或点击选择文件</div>
    <div class="drop-fmt">MP3 · WAV · M4A · WEBM · OGG · FLAC · 不限大小</div>
    <input type="file" id="fileInput" accept="audio/*,video/*">
  </div>

  <div class="file-info" id="fi">
    <div class="fi-icon">🎵</div>
    <div>
      <div class="fi-name" id="fiName">—</div>
      <div class="fi-size" id="fiSize">—</div>
    </div>
    <button class="fi-clear" onclick="clearFile()">✕</button>
  </div>

  <div class="div">或直接录音</div>

  <div class="rec-wrap">
    <button class="btn-rec" id="recBtn" onclick="toggleRec()">
      <div class="rec-dot"></div>
      <span id="recLbl">开始录音</span>
    </button>
    <canvas id="wv"></canvas>
    <div class="timer" id="timer">00:00</div>
  </div>

  <div class="err" id="errBox"></div>
  <button class="btn-go" id="goBtn" onclick="startPipeline()">🧠 开始 AI 分析</button>
</div>

<div class="card" id="pipe">
  <div class="pipe-title">处理进度</div>
  <div class="nodes">
    <div class="nd" id="n0"><div class="nd-circle">✂️</div><div class="nd-lbl">音频<br>分块</div></div>
    <div class="nd" id="n1"><div class="nd-circle">📝</div><div class="nd-lbl">逐块<br>转录</div></div>
    <div class="nd" id="n2"><div class="nd-circle">🔍</div><div class="nd-lbl">逐块<br>分析</div></div>
    <div class="nd" id="n3"><div class="nd-circle">✨</div><div class="nd-lbl">综合<br>总结</div></div>
  </div>
  <div class="prog-row"><span id="progTxt">准备中...</span><span id="progPct">0%</span></div>
  <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
  <div class="log" id="logEl"></div>
</div>

<div id="res">
  <div class="res-hd">
    <div class="res-title">📋 会议总结</div>
    <div class="res-acts">
      <button class="btn-act" onclick="copyAll()">复制全部</button>
      <button class="btn-act" onclick="exportMd()">导出 .md</button>
      <button class="btn-act btn-new" onclick="resetApp()">+ 新会议</button>
    </div>
  </div>
  <div class="sgrid" id="sgrid"></div>
  <div class="coll" id="cTrans">
    <div class="coll-hd" onclick="togColl('cTrans')">
      <span class="coll-ttl">📄 原始转录文本</span>
      <span class="coll-arr">▼</span>
    </div>
    <div class="coll-body"><div class="coll-txt" id="transText"></div></div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────
const API_KEY  = 'sk-EPgNDVkrqDp5g3e3i3mKnotZ2yndt2zsxUCpHZIjRihVpLnY';
const API_BASE = 'https://api.openai.com/v1';
const WHISPER  = 'whisper-1';
const GPT      = 'gpt-4o';
const CHUNK_BYTES = 24 * 1024 * 1024; // 24 MB per chunk (Whisper limit 25 MB)

// ── State ────────────────────────────────────────────────
let audioFile = null, summaryData = null;
let mediaRecorder = null, recChunks = [], recTimer = null, recSecs = 0;
let animF = null, analyser = null, actx = null;

// ── Init ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  const dz = document.getElementById('dz');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f); else showErr('请选择音频文件');
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });
});

// ── File ─────────────────────────────────────────────────
function setFile(f) {
  audioFile = f;
  document.getElementById('fiName').textContent = f.name;
  const chunks = Math.ceil(f.size / CHUNK_BYTES);
  document.getElementById('fiSize').textContent =
    fmtBytes(f.size) + (chunks > 1 ? ` · 将分 ${chunks} 块处理` : '');
  document.getElementById('fi').classList.add('show');
  document.getElementById('goBtn').classList.add('show');
  clearErr();
}

function clearFile() {
  audioFile = null;
  document.getElementById('fi').classList.remove('show');
  document.getElementById('goBtn').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function fmtBytes(b) {
  return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
}

// ── Record ───────────────────────────────────────────────
async function toggleRec() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRec();
  else await startRec();
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    actx = new AudioContext();
    analyser = actx.createAnalyser(); analyser.fftSize = 256;
    actx.createMediaStreamSource(stream).connect(analyser);
    mediaRecorder = new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recChunks, { type: 'audio/webm' });
      setFile(new File([blob], `rec_${Date.now()}.webm`, { type: 'audio/webm' }));
      stream.getTracks().forEach(t => t.stop());
      if (animF) cancelAnimationFrame(animF);
      if (actx) { actx.close(); actx = null; }
    };
    mediaRecorder.start(100);
    recSecs = 0;
    recTimer = setInterval(() => {
      recSecs++;
      document.getElementById('timer').textContent =
        String(Math.floor(recSecs/60)).padStart(2,'0') + ':' + String(recSecs%60).padStart(2,'0');
    }, 1000);
    document.getElementById('recBtn').classList.add('on');
    document.getElementById('recLbl').textContent = '停止录音';
    document.getElementById('wv').classList.add('on');
    document.getElementById('timer').classList.add('on');
    drawWav();
  } catch(e) { showErr('无法访问麦克风：' + e.message); }
}

function stopRec() {
  clearInterval(recTimer);
  if (mediaRecorder) mediaRecorder.stop();
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recLbl').textContent = '开始录音';
  document.getElementById('wv').classList.remove('on');
  document.getElementById('timer').classList.remove('on');
}

function drawWav() {
  const cv = document.getElementById('wv');
  const ctx = cv.getContext('2d');
  cv.width = cv.offsetWidth * devicePixelRatio;
  cv.height = cv.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = cv.offsetWidth, H = cv.offsetHeight;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  (function draw() {
    animF = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#00e5cc'; ctx.lineWidth=1.5;
    ctx.shadowBlur=8; ctx.shadowColor='#00e5cc';
    ctx.beginPath();
    const sw = W / buf.length;
    buf.forEach((v,i) => {
      const y = (v/128) * H/2;
      i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i*sw, y);
    });
    ctx.stroke();
  })();
}

// ── Pipeline ─────────────────────────────────────────────
async function startPipeline() {
  if (!audioFile) { showErr('请先选择或录制音频'); return; }
  clearErr();
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('pipe').classList.add('show');
  document.getElementById('res').classList.remove('show');
  document.getElementById('logEl').innerHTML = '';
  setP(0, '准备中...');

  try {
    // Stage 0 — slice by bytes (no decode, no crash)
    setNode(0,'active');
    addLog('按字节分块，无需解码...');
    setP(5,'音频分块中...');
    const chunks = sliceFile(audioFile);
    addLog(`✓ 共 ${chunks.length} 块，每块最大 24MB`, 'ok');
    setNode(0,'done'); setNode(1,'active');

    // Stage 1 — transcribe
    setP(10, `转录 0/${chunks.length}`);
    const transcripts = [];
    for (let i = 0; i < chunks.length; i++) {
      addLog(`转录第 ${i+1}/${chunks.length} 块...`);
      const t = await transcribeChunk(chunks[i], i);
      transcripts.push(t);
      setP(10 + Math.round(((i+1)/chunks.length)*35), `转录 ${i+1}/${chunks.length}`);
      addLog(`✓ 第 ${i+1} 块 · ${t.length} 字`, 'ok');
    }
    setNode(1,'done'); setNode(2,'active');

    // Stage 2 — per-chunk summary
    setP(45, `分析 0/${chunks.length}`);
    const minis = [];
    for (let i = 0; i < transcripts.length; i++) {
      addLog(`分析第 ${i+1}/${transcripts.length} 块...`);
      minis.push(await summarizeChunk(transcripts[i], i));
      setP(45 + Math.round(((i+1)/transcripts.length)*30), `分析 ${i+1}/${transcripts.length}`);
      addLog(`✓ 第 ${i+1} 块分析完成`, 'ok');
    }
    setNode(2,'done'); setNode(3,'active');

    // Stage 3 — final synthesis
    setP(80,'综合总结生成中...');
    addLog('综合所有段落...');
    const final = await synthesize(minis);
    setNode(3,'done');
    setP(100,'完成！');
    addLog('✓ 总结生成完毕', 'ok');

    showResults(final, transcripts.join('\n\n---\n\n'));

  } catch(e) {
    addLog('✗ ' + e.message, 'er');
    showErr(e.message);
    document.getElementById('inputCard').style.display = '';
    document.getElementById('pipe').classList.remove('show');
  }
}

// ── Slice file (pure byte slicing, zero decode) ──────────
function sliceFile(file) {
  const chunks = [];
  for (let offset = 0; offset < file.size; offset += CHUNK_BYTES)
    chunks.push(file.slice(offset, offset + CHUNK_BYTES));
  return chunks;
}

// ── Whisper transcription ─────────────────────────────────
async function transcribeChunk(blob, idx) {
  const ext = (audioFile.name.split('.').pop() || 'mp3').toLowerCase();
  const fd = new FormData();
  fd.append('file', blob, `chunk_${idx}.${ext}`);
  fd.append('model', WHISPER);
  fd.append('response_format', 'text');

  const res = await fetch(`${API_BASE}/audio/transcriptions`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + API_KEY },
    body: fd
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error('转录失败: ' + (e.error?.message || res.status));
  }
  return (await res.text()).trim();
}

// ── Per-chunk summarize ───────────────────────────────────
async function summarizeChunk(transcript, idx) {
  if (!transcript || transcript.length < 5) return `[第${idx+1}块无有效内容]`;
  return await gpt(
    '你是会议记录专家。从以下会议片段中提取：话题、决策、行动项（含责任人和截止日期）、核心观点。只记录实际内容，保持简洁。',
    `会议片段 ${idx+1}：\n\n${transcript}`
  );
}

// ── Final synthesis ───────────────────────────────────────
async function synthesize(minis) {
  const joined = minis.map((s,i) => `【第${i+1}段】\n${s}`).join('\n\n---\n\n');
  const raw = await gpt(
    `你是专业会议分析师。综合以下各段摘要生成完整会议总结，去重合并，保留所有行动项和决策。
严格输出JSON，不加代码块标记：
{"topic":"会议主题","decisions":["决策"],"action_items":[{"task":"任务","owner":"责任人","deadline":"截止"}],"key_points":["观点"],"unresolved":["问题"],"next_steps":["事项"]}`,
    `各段摘要：\n\n${joined}`
  );
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch { return { topic: raw, decisions:[], action_items:[], key_points:[], unresolved:[], next_steps:[] }; }
}

// ── GPT chat ─────────────────────────────────────────────
async function gpt(system, user) {
  const res = await fetch(`${API_BASE}/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+API_KEY },
    body: JSON.stringify({ model: GPT, max_tokens: 2000,
      messages: [{ role:'system', content:system }, { role:'user', content:user }] })
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error?.message || 'API 错误 ' + res.status);
  }
  return (await res.json()).choices?.[0]?.message?.content || '';
}

// ── Render results ────────────────────────────────────────
function showResults(s, transcript) {
  summaryData = s;
  document.getElementById('pipe').classList.remove('show');
  document.getElementById('res').classList.add('show');
  document.getElementById('transText').textContent = transcript;

  const grid = document.getElementById('sgrid');
  grid.innerHTML = '';
  [
    { key:'topic',       icon:'📋', label:'会议主题与背景',
      html: v => `<div class="sc-body">${v}</div>` },
    { key:'decisions',   icon:'✅', label:'关键决策',
      html: v => v.length ? `<div class="sc-body"><ul>${v.map(x=>`<li><span>${x}</span></li>`).join('')}</ul></div>` : null },
    { key:'action_items',icon:'📌', label:'行动项目',
      html: v => v.length ? `<div class="sc-body"><ul>${v.map(a=>`<li><div><div>${a.task}</div><div class="ai-meta">责任人: <span>${a.owner}</span> &nbsp;·&nbsp; 截止: <span>${a.deadline}</span></div></div></li>`).join('')}</ul></div>` : null },
    { key:'key_points',  icon:'💡', label:'核心讨论重点',
      html: v => v.length ? `<div class="sc-body"><ul>${v.map(x=>`<li><span>${x}</span></li>`).join('')}</ul></div>` : null },
    { key:'unresolved',  icon:'⚠️', label:'未解决问题',
      html: v => v.length ? `<div class="sc-body"><ul>${v.map(x=>`<li><span>${x}</span></li>`).join('')}</ul></div>` : null },
    { key:'next_steps',  icon:'⏭️', label:'后续跟进',
      html: v => v.length ? `<div class="sc-body"><ul>${v.map(x=>`<li><span>${x}</span></li>`).join('')}</ul></div>` : null },
  ].forEach((sec, i) => {
    const val = s[sec.key];
    if (!val || (Array.isArray(val) && !val.length)) return;
    const h = sec.html(val); if (!h) return;
    const el = document.createElement('div');
    el.className = 'sc';
    el.style.animationDelay = (i*0.07)+'s';
    el.innerHTML = `<div class="sc-hd"><div class="sc-title">${sec.icon} ${sec.label}</div>
      <button class="sc-copy" onclick="copySection('${sec.key}')">复制</button></div>${h}`;
    grid.appendChild(el);
  });
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── Actions ───────────────────────────────────────────────
function copySection(key) {
  const v = summaryData?.[key]; if (v == null) return;
  const t = typeof v==='string' ? v :
    v.map(x => typeof x==='object' ? `• ${x.task} [${x.owner} / ${x.deadline}]` : '• '+x).join('\n');
  navigator.clipboard.writeText(t).then(() => showToast('已复制'));
}

function copyAll() {
  const s = summaryData; if (!s) return;
  const md = buildMd(s);
  navigator.clipboard.writeText(md).then(() => showToast('已复制全部'));
}

function exportMd() {
  const s = summaryData; if (!s) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buildMd(s)], { type:'text/markdown' }));
  a.download = `meeting_${Date.now()}.md`;
  a.click();
  showToast('已导出 .md');
}

function buildMd(s) {
  const d = new Date().toLocaleDateString('zh-CN');
  return [
    `# 会议总结 — ${d}\n`,
    `## 📋 会议主题\n${s.topic}\n`,
    s.decisions?.length    ? `## ✅ 关键决策\n${s.decisions.map(x=>'- '+x).join('\n')}\n` : '',
    s.action_items?.length ? `## 📌 行动项目\n${s.action_items.map(a=>`- **${a.task}** · 责任人: ${a.owner} · 截止: ${a.deadline}`).join('\n')}\n` : '',
    s.key_points?.length   ? `## 💡 核心观点\n${s.key_points.map(x=>'- '+x).join('\n')}\n` : '',
    s.unresolved?.length   ? `## ⚠️ 未解决问题\n${s.unresolved.map(x=>'- '+x).join('\n')}\n` : '',
    s.next_steps?.length   ? `## ⏭️ 后续跟进\n${s.next_steps.map(x=>'- '+x).join('\n')}\n` : '',
    '---\n*由 MeetingMind 生成*'
  ].filter(Boolean).join('\n');
}

function resetApp() {
  audioFile = null; summaryData = null;
  document.getElementById('inputCard').style.display = '';
  document.getElementById('pipe').classList.remove('show');
  document.getElementById('res').classList.remove('show');
  document.getElementById('fi').classList.remove('show');
  document.getElementById('goBtn').classList.remove('show');
  document.getElementById('fileInput').value = '';
  document.getElementById('logEl').innerHTML = '';
  document.getElementById('sgrid').innerHTML = '';
  setP(0,'准备中...'); [0,1,2,3].forEach(i=>setNode(i,''));
  clearErr();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function togColl(id) { document.getElementById(id).classList.toggle('open'); }

// ── UI helpers ────────────────────────────────────────────
function setNode(i, state) { document.getElementById('n'+i).className = 'nd '+state; }
function setP(pct, txt) {
  document.getElementById('fill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = txt;
  document.getElementById('progPct').textContent = pct+'%';
}
function addLog(msg, type='') {
  const d = document.createElement('div'); d.className = 'll '+type;
  const now = new Date();
  const t = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  d.innerHTML = `<span class="lt">${t}</span><span>${msg}</span>`;
  const el = document.getElementById('logEl');
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = '⚠ '+msg; e.classList.add('show');
}
function clearErr() { document.getElementById('errBox').classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
